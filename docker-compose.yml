version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pawon-paramarta
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: pawon-paramarta_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:80"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: pawon-paramarta-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pawon-paramarta
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_PASSWORD: pawon-paramarta123
      MYSQL_USER: pawon-paramarta
    ports:
      - "3309:3309"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: